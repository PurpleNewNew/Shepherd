x-shepherd-image: &shepherd_image
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: shepherd-lab:dev

services:
  kelpie:
    <<: *shepherd_image
    command:
      - "kelpie"
      - "-s"
      - "${SHEPHERD_SECRET:-Shepherd1234}"
      - "--ui-grpc-listen"
      - "0.0.0.0:50061"
      - "--ui-grpc-token"
      - "${SHEPHERD_UI_TOKEN:-stockman-dev-token}"
      - "--ui-grpc-rate"
      - "0"
      - "--dataplane-listen"
      - "0.0.0.0:60080"
    ports:
      - "127.0.0.1:${SHEPHERD_UI_PORT:-50061}:50061"
      - "127.0.0.1:${SHEPHERD_DATAPLANE_PORT:-60080}:60080"
    volumes:
      - kelpie-demo-db:/app/db
    restart: unless-stopped

  flock-root:
    <<: *shepherd_image
    depends_on:
      - kelpie
    command:
      - "flock"
      - "-s"
      - "${SHEPHERD_SECRET:-Shepherd1234}"
      - "-c"
      - "kelpie:40100"
      - "--reconnect"
      - "${FLOCK_RECONNECT_SECONDS:-2}"
      - "--repair-port"
      - "43100"
    restart: unless-stopped

  flock-mid:
    <<: *shepherd_image
    depends_on:
      - flock-root
    command:
      - "flock"
      - "-s"
      - "${SHEPHERD_SECRET:-Shepherd1234}"
      - "-c"
      - "flock-root:41000"
      - "--reconnect"
      - "${FLOCK_RECONNECT_SECONDS:-2}"
      - "--repair-port"
      - "43200"
    restart: unless-stopped

  flock-leaf:
    <<: *shepherd_image
    depends_on:
      - flock-mid
    command:
      - "flock"
      - "-s"
      - "${SHEPHERD_SECRET:-Shepherd1234}"
      - "-c"
      - "flock-mid:42000"
      - "--reconnect"
      - "${FLOCK_RECONNECT_SECONDS:-2}"
      - "--repair-port"
      - "43300"
    restart: unless-stopped

  bootstrap-chain:
    <<: *shepherd_image
    depends_on:
      - kelpie
      - flock-root
      - flock-mid
      - flock-leaf
    command:
      - "shepherd-lab-bootstrap"
    environment:
      KELPIE_GRPC_ADDR: "kelpie:50061"
      KELPIE_GRPC_TOKEN: "${SHEPHERD_UI_TOKEN:-stockman-dev-token}"
      KELPIE_CONTROLLER_BIND: "0.0.0.0:40100"
      PIVOT_BINDS: "0.0.0.0:41000,0.0.0.0:42000"
      EXPECTED_ONLINE_NODES: "3"
      BOOTSTRAP_TIMEOUT: "300s"
    restart: "no"

volumes:
  kelpie-demo-db: {}
