<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
<defs>
  <marker id="arrow_main" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
  </marker>
  <marker id="arrow_accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
  </marker>
</defs>
<style>
  .bg { fill: #ffffff; }
  .frame { fill: none; stroke: #94a3b8; stroke-width: 1.2; }
  .panel { fill: #ffffff; stroke: #64748b; stroke-width: 1.2; }
  .subpanel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.0; }
  .cluster { fill: none; stroke: #94a3b8; stroke-width: 1.1; stroke-dasharray: 6 4; }
  .title { fill: #0f172a; font: 700 24px "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif; }
  .subtitle { fill: #334155; font: 14px "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif; }
  .h1 { fill: #0f172a; font: 700 18px "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif; }
  .h2 { fill: #0f172a; font: 700 15px "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif; }
  .text { fill: #334155; font: 13px "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif; }
  .small { fill: #475569; font: 12px "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif; }
</style>

<rect class="bg" x="0" y="0" width="1000" height="620"/>
<rect class="frame" x="30" y="26" width="940" height="568"/>

<text class="title" x="54" y="58">Shepherd overall architecture</text>
<text class="subtitle" x="54" y="84">Stockman connects only to Kelpie. Kelpie maintains topology, routing, DTN scheduling and supplemental repair for the Flock overlay.</text>

<rect class="panel" x="58" y="132" width="190" height="310"/>
<text class="h1" x="78" y="164">Stockman</text>
<text class="text" x="78" y="190">Qt desktop client</text>
<rect class="subpanel" x="78" y="214" width="150" height="58"/>
<text class="h2" x="92" y="238">Topology view</text>
<text class="text" x="92" y="258">snapshot / status / graph</text>
<rect class="subpanel" x="78" y="292" width="150" height="58"/>
<text class="h2" x="92" y="316">Task dispatch</text>
<text class="text" x="92" y="336">command / file / proxy</text>
<rect class="subpanel" x="78" y="370" width="150" height="52"/>
<text class="h2" x="92" y="394">Observation</text>
<text class="text" x="92" y="412">logs / DTN metrics</text>

<rect class="panel" x="352" y="122" width="282" height="372"/>
<text class="h1" x="374" y="154">Kelpie</text>
<text class="text" x="374" y="180">central control and scheduling plane</text>
<rect class="subpanel" x="374" y="206" width="238" height="64"/>
<text class="h2" x="390" y="232">Topology graph + sleep-aware ETTD</text>
<text class="text" x="390" y="252">earliest-arrival routing with wake/sleep delay</text>
<rect class="subpanel" x="374" y="292" width="238" height="64"/>
<text class="h2" x="390" y="318">Supplemental planner / rescue</text>
<text class="text" x="390" y="338">candidate scoring, reparent, failover</text>
<rect class="subpanel" x="374" y="378" width="238" height="64"/>
<text class="h2" x="390" y="404">DTN queue + DTN-Stream</text>
<text class="text" x="390" y="424">store-carry-forward, framing and ACK</text>

<path d="M 248 244 C 292 220, 316 204, 352 198" fill="none" stroke="#1d4ed8" stroke-width="2.0" marker-end="url(#arrow_accent)"/>
<text class="small" x="278" y="205">gRPC UI</text>

<rect class="cluster" x="690" y="126" width="246" height="388"/>
<text class="h1" x="712" y="158">Flock overlay</text>
<text class="text" x="712" y="182">challenged, multi-hop, intermittently connected</text>

<rect class="panel" x="724" y="222" width="170" height="56"/>
<text class="h2" x="742" y="246">Flock root</text>
<text class="text" x="742" y="266">gossip / relay / repair</text>

<rect class="panel" x="764" y="334" width="170" height="56"/>
<text class="h2" x="782" y="358">Flock mid</text>
<text class="text" x="782" y="378">parent-child forwarding</text>

<rect class="panel" x="724" y="446" width="170" height="56"/>
<text class="h2" x="742" y="470">Flock leaf</text>
<text class="text" x="742" y="490">execution / reconnect / carry-forward</text>

<path d="M 634 216 C 678 208, 702 214, 724 236" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_main)"/>
<text class="small" x="664" y="200">control protocol</text>

<path d="M 634 410 C 676 398, 700 396, 724 470" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_main)"/>
<text class="small" x="660" y="386">DTN / stream payload</text>

<path d="M 809 278 C 822 306, 834 322, 849 334" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow_main)"/>
<path d="M 849 390 C 836 418, 824 434, 809 446" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow_main)"/>
<path d="M 878 274 C 916 332, 915 392, 878 450" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-dasharray="7 5" marker-end="url(#arrow_accent)"/>
<text class="small" x="900" y="356" transform="rotate(90 900 356)">supplemental edge</text>

<text class="small" x="58" y="536">Figure note: the architecture is intentionally layered around one problem, namely control convergence and eventual delivery under sleep, delay and intermittent connectivity.</text>
</svg>
